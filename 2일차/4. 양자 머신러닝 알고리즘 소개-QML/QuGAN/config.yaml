# Learning Settings for GAN training
learning_settings:
  learning_rate: 0.01
  train_iter: 10
  train_size: 10
  train_on_fake: 5 # Number of times to train discriminator on fake data

# Tracking variables (typically initialized empty or with zeros)
tracking:
  tracked_d_loss: []
  tracked_g_loss: []
  tracked_loss_d_to_g: []
  tracked_loss_d_to_real: []

# Metrics and state variables (initial values)
metrics:
  corr: 0
  wrong: 0
  loss_d_to_g: 0
  loss_d_to_real: 0